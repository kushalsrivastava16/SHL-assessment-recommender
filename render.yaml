# Render.com blueprint. Push this repo to GitHub, then "New > Blueprint" in
# Render and point it here. Set LLM_API_KEY as a secret in the dashboard.
#
# Free instances sleep when idle; the spec allows up to 2 minutes for the first
# /health to wake the service, which covers cold start + model load.
services:
  - type: web
    name: shl-recommender
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: LLM_API_KEY
        sync: false          # set in dashboard as a secret
      - key: CATALOG_PATH
        value: data/catalog.json
      - key: RETRIEVE_K
        value: "30"
      - key: MAX_CLARIFY_TURNS
        value: "2"
